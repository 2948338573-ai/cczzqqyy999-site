<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="cczzqqyy999.me 的个人网站。">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://cczzqqyy999.me/">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_CN">
  <meta property="og:site_name" content="cczzqqyy999.me">
  <meta property="og:title" content="我的网站">
  <meta property="og:description" content="cczzqqyy999.me 的个人网站。">
  <meta property="og:url" content="https://cczzqqyy999.me/">
  <meta property="og:image" content="https://cczzqqyy999.me/assets/hero-anime.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="我的网站">
  <meta name="twitter:description" content="cczzqqyy999.me 的个人网站。">
  <meta name="twitter:image" content="https://cczzqqyy999.me/assets/hero-anime.png">
  <meta name="theme-color" content="#172554">
  <link rel="preload" href="assets/hero-anime.webp" as="image" type="image/webp">
  <title>我的网站</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    html,
    body {
      overflow: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background-color: #091225;
      color: #ffffff;
      isolation: isolate;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -4;
      background-image: url("assets/hero-anime.webp");
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(180deg, rgba(8, 18, 45, 0.18), rgba(7, 12, 31, 0.72)),
        linear-gradient(90deg, rgba(7, 12, 31, 0.68), rgba(7, 12, 31, 0.06) 48%, rgba(7, 12, 31, 0.7));
      pointer-events: none;
    }

    .meteor-layer {
      position: fixed;
      inset: 0;
      z-index: -2;
      overflow: hidden;
      pointer-events: none;
    }

    .meteor {
      position: absolute;
      top: var(--top);
      left: var(--left);
      width: var(--length);
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.95));
      box-shadow: 0 0 14px rgba(152, 208, 255, 0.8);
      opacity: 0;
      transform: rotate(-28deg) translateX(0);
      transform-origin: right center;
      animation: meteorFall var(--duration) linear infinite;
      animation-delay: var(--delay);
    }

    .meteor::after {
      content: "";
      position: absolute;
      right: -2px;
      top: 50%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 16px rgba(255, 255, 255, 0.95);
      transform: translateY(-50%);
    }

    .hair-wind {
      position: fixed;
      top: 54.7svh;
      left: calc(50% - 5.05svh);
      z-index: -3;
      width: 10.1svh;
      aspect-ratio: 1;
      background: url("assets/hair-overlay.png") center / contain no-repeat;
      transform-origin: 50% 82%;
      animation: hairWind 2.4s ease-in-out infinite;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.18));
      pointer-events: none;
    }

    @keyframes meteorFall {
      0% {
        opacity: 0;
        transform: rotate(-28deg) translateX(0);
      }

      8% {
        opacity: 1;
      }

      34% {
        opacity: 0.95;
      }

      100% {
        opacity: 0;
        transform: rotate(-28deg) translateX(-145vw);
      }
    }

    @keyframes hairWind {
      0%,
      100% {
        transform: translate3d(0, 0, 0) rotate(0deg) skewX(0deg);
      }

      28% {
        transform: translate3d(1px, -0.5px, 0) rotate(1.8deg) skewX(2deg);
      }

      58% {
        transform: translate3d(-1px, 0.5px, 0) rotate(-1.2deg) skewX(-1.4deg);
      }

      78% {
        transform: translate3d(0.5px, -0.5px, 0) rotate(1deg) skewX(1.2deg);
      }
    }

    .music-toggle {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 10;
      width: 52px;
      height: 52px;
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: rgba(9, 18, 37, 0.52);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(14px);
      cursor: pointer;
    }

    .music-toggle:hover {
      background: rgba(18, 33, 63, 0.7);
    }

    .music-toggle:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .music-toggle__play {
      width: 0;
      height: 0;
      margin-left: 4px;
      border-top: 9px solid transparent;
      border-bottom: 9px solid transparent;
      border-left: 15px solid currentColor;
    }

    .music-toggle__pause {
      display: none;
      width: 15px;
      height: 18px;
      border-left: 5px solid currentColor;
      border-right: 5px solid currentColor;
    }

    .music-toggle.is-playing .music-toggle__play {
      display: none;
    }

    .music-toggle.is-playing .music-toggle__pause {
      display: block;
    }

    @media (max-width: 640px) {
      body {
        padding: 18px;
      }

      body::before {
        background-position: center bottom;
      }

      .hair-wind {
        top: 54.7svh;
        width: 10.1svh;
        left: calc(50% - 5.05svh);
      }

      .music-toggle {
        right: 18px;
        bottom: 18px;
        width: 48px;
        height: 48px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .meteor,
      .hair-wind {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="hair-wind" aria-hidden="true"></div>
  <div class="meteor-layer" aria-hidden="true">
    <span class="meteor" style="--top: 8%; --left: 112%; --length: 150px; --duration: 5.8s; --delay: -1.1s;"></span>
    <span class="meteor" style="--top: 18%; --left: 126%; --length: 112px; --duration: 6.9s; --delay: -3.6s;"></span>
    <span class="meteor" style="--top: 31%; --left: 118%; --length: 132px; --duration: 7.4s; --delay: -5.2s;"></span>
    <span class="meteor" style="--top: 12%; --left: 146%; --length: 92px; --duration: 8.6s; --delay: -7.4s;"></span>
    <span class="meteor" style="--top: 25%; --left: 138%; --length: 170px; --duration: 9.2s; --delay: -9s;"></span>
  </div>
  <audio id="backgroundMusic" src="assets/flower-sea.mp3" preload="metadata" loop></audio>
  <button class="music-toggle" id="musicToggle" type="button" aria-label="播放背景音乐" aria-pressed="false" disabled>
    <span class="music-toggle__play" aria-hidden="true"></span>
    <span class="music-toggle__pause" aria-hidden="true"></span>
  </button>
  <script>
    const music = document.getElementById("backgroundMusic");
    const musicToggle = document.getElementById("musicToggle");

    music.addEventListener("loadedmetadata", () => {
      musicToggle.disabled = false;
    });

    music.addEventListener("error", () => {
      musicToggle.disabled = true;
      musicToggle.classList.remove("is-playing");
      musicToggle.setAttribute("aria-label", "背景音乐文件未就绪");
      musicToggle.setAttribute("aria-pressed", "false");
    });

    musicToggle.addEventListener("click", async () => {
      if (music.paused) {
        try {
          await music.play();
          musicToggle.classList.add("is-playing");
          musicToggle.setAttribute("aria-label", "暂停背景音乐");
          musicToggle.setAttribute("aria-pressed", "true");
        } catch {
          musicToggle.classList.remove("is-playing");
          musicToggle.setAttribute("aria-label", "播放背景音乐");
          musicToggle.setAttribute("aria-pressed", "false");
        }

        return;
      }

      music.pause();
      musicToggle.classList.remove("is-playing");
      musicToggle.setAttribute("aria-label", "播放背景音乐");
      musicToggle.setAttribute("aria-pressed", "false");
    });
  </script>
</body>
</html>
