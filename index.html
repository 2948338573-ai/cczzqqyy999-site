<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_CN">

  <meta property="og:title" content="我的网站">

  <meta property="og:image" content="https://cczzqqyy999.me/assets/hero-anime.png">
  <meta name="twitter:card" content="summary">

  <meta name="theme-color" content="#172554">
  <link rel="preload" href="assets/hero-anime.webp" as="image" type="image/webp">
  <title>我的网站</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    html,
    body {
      overflow: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background-color: #091225;
      color: #ffffff;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -3%;
      z-index: -2;
      background-image: url("assets/hero-anime.webp");
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      animation: animeDrift 28s ease-in-out infinite alternate;
      will-change: transform, filter;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(180deg, rgba(8, 18, 45, 0.18), rgba(7, 12, 31, 0.72)),
        linear-gradient(90deg, rgba(7, 12, 31, 0.68), rgba(7, 12, 31, 0.06) 48%, rgba(7, 12, 31, 0.7)),
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.26) 0 1px, transparent 1.5px),
        radial-gradient(circle at 72% 12%, rgba(255, 255, 255, 0.22) 0 1px, transparent 1.5px);
      background-size: auto, auto, 180px 180px, 240px 240px;
      opacity: 1;
      animation: starFloat 18s linear infinite;
      pointer-events: none;
    }

    @keyframes animeDrift {
      0% {
        transform: scale(1) translate3d(-0.6%, -0.4%, 0);
        filter: saturate(1) brightness(1);
      }

      50% {
        transform: scale(1.035) translate3d(0.7%, 0.4%, 0);
        filter: saturate(1.06) brightness(1.02);
      }

      100% {
        transform: scale(1.07) translate3d(-0.2%, 0.8%, 0);
        filter: saturate(1.03) brightness(0.98);
      }
    }

    @keyframes starFloat {
      0% {
        background-position: 0 0, 0 0, 0 0, 0 0;
      }

      100% {
        background-position: 0 0, 0 0, 32px -46px, -38px -72px;
      }
    }

    .music-toggle {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 10;
      width: 52px;
      height: 52px;
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: rgba(9, 18, 37, 0.52);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(14px);
      cursor: pointer;
    }

    .music-toggle:hover {
      background: rgba(18, 33, 63, 0.7);
    }

    .music-toggle:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .music-toggle__play {
      width: 0;
      height: 0;
      margin-left: 4px;
      border-top: 9px solid transparent;
      border-bottom: 9px solid transparent;
      border-left: 15px solid currentColor;
    }

    .music-toggle__pause {
      display: none;
      width: 15px;
      height: 18px;
      border-left: 5px solid currentColor;
      border-right: 5px solid currentColor;
    }

    .music-toggle.is-playing .music-toggle__play {
      display: none;
    }

    .music-toggle.is-playing .music-toggle__pause {
      display: block;
    }

    @media (max-width: 640px) {
      body {
        padding: 18px;
      }

      body::before {
        background-position: center bottom;
      }

      .music-toggle {
        right: 18px;
        bottom: 18px;
        width: 48px;
        height: 48px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body::before,
      body::after {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <audio id="backgroundMusic" src="assets/flower-sea.mp3" preload="metadata" loop></audio>
  <button class="music-toggle" id="musicToggle" type="button" aria-label="播放背景音乐" aria-pressed="false" disabled>
    <span class="music-toggle__play" aria-hidden="true"></span>
    <span class="music-toggle__pause" aria-hidden="true"></span>
  </button>
  <script>
    const music = document.getElementById("backgroundMusic");
    const musicToggle = document.getElementById("musicToggle");

    music.addEventListener("loadedmetadata", () => {
      musicToggle.disabled = false;
    });

    music.addEventListener("error", () => {
      musicToggle.disabled = true;
      musicToggle.classList.remove("is-playing");
      musicToggle.setAttribute("aria-label", "背景音乐文件未就绪");
      musicToggle.setAttribute("aria-pressed", "false");
    });

    musicToggle.addEventListener("click", async () => {
      if (music.paused) {
        try {
          await music.play();
          musicToggle.classList.add("is-playing");
          musicToggle.setAttribute("aria-label", "暂停背景音乐");
          musicToggle.setAttribute("aria-pressed", "true");
        } catch {
          musicToggle.classList.remove("is-playing");
          musicToggle.setAttribute("aria-label", "播放背景音乐");
          musicToggle.setAttribute("aria-pressed", "false");
        }

        return;
      }

      music.pause();
      musicToggle.classList.remove("is-playing");
      musicToggle.setAttribute("aria-label", "播放背景音乐");
      musicToggle.setAttribute("aria-pressed", "false");
    });
  </script>
</body>
</html>
