<html lang="zh-CN">
<head>

  <link rel="preload" href="assets/space-wormhole-bg.png" as="image" type="image/png">
  <link rel="preload" href="assets/space-orbit-bg.png" as="image" type="image/png">
  <title>我的网站</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
      scroll-snap-type: y mandatory;
      background: #05070c;
    }

    body {
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 300vh;
      min-height: 300svh;
      padding: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background-color: #05070c;
      color: #ffffff;
      isolation: isolate;
      --scroll: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -7;
      background:
        radial-gradient(circle at 50% 50%, rgba(52, 77, 112, 0.24), transparent 42%),
        #05070c;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background-image:
        linear-gradient(180deg, rgba(3, 5, 10, 0.28), rgba(3, 5, 10, 0.18) 45%, rgba(2, 3, 7, 0.72)),
        radial-gradient(circle at 50% 66%, rgba(255, 198, 112, 0.12), transparent 30%),
        radial-gradient(circle at 74% 16%, rgba(146, 192, 255, 0.16), transparent 24%),
        linear-gradient(90deg, rgba(2, 3, 8, 0.72), rgba(2, 3, 8, 0.03) 48%, rgba(2, 3, 8, 0.72));
      pointer-events: none;
    }

    .scene-backdrops,
    .scene-frame,
    .cinema-stage,
    .stars-drift,
    .accretion-halo,
    .lens-sweep,
    .film-grain,
    .ship-glint,
    .warp-tunnel,
    .orbital-veil,
    .letterbox {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .cinema-stage {
      z-index: -5;
      overflow: hidden;
    }

    .scene-backdrops {
      z-index: -6;
      overflow: hidden;
    }

    .scene-frame {
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      opacity: 0;
      transform: scale(1.04);
      transition: opacity 420ms ease-out;
      will-change: opacity, transform, filter;
    }

    .scene-frame[data-scene-frame="0"] {
      background-image: url("assets/space-cinema-bg.webp");
      opacity: 1;
    }

    .scene-frame[data-scene-frame="1"] {
      background-image: url("assets/space-wormhole-bg.png");
    }

    .scene-frame[data-scene-frame="2"] {
      background-image: url("assets/space-orbit-bg.png");
      background-position: center bottom;
    }

    .stars-drift {
      z-index: -4;
      background-image:
        radial-gradient(circle at 12% 24%, rgba(255, 255, 255, 0.75) 0 1px, transparent 1.5px),
        radial-gradient(circle at 78% 18%, rgba(180, 215, 255, 0.65) 0 1px, transparent 1.5px),
        radial-gradient(circle at 42% 9%, rgba(255, 225, 180, 0.48) 0 1px, transparent 1.5px),
        radial-gradient(circle at 64% 42%, rgba(255, 255, 255, 0.34) 0 1px, transparent 1.5px);
      background-size: 220px 220px, 310px 310px, 420px 420px, 540px 540px;
      mix-blend-mode: screen;
      opacity: 0.72;
      animation: starField 54s linear infinite;
      transform: translate3d(calc(var(--scroll) * -32px), calc(var(--scroll) * 52px), 0);
    }

    .accretion-halo {
      z-index: -3;
      top: auto;
      left: 50%;
      bottom: 18svh;
      width: min(72vw, 980px);
      height: min(17vw, 210px);
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, transparent 0 31%, rgba(255, 214, 143, 0.2) 37%, rgba(255, 187, 91, 0.42) 42%, transparent 55%),
        conic-gradient(from 90deg, transparent, rgba(255, 230, 170, 0.18), transparent, rgba(255, 171, 71, 0.32), transparent);
      filter: blur(1px) drop-shadow(0 0 22px rgba(255, 178, 79, 0.38));
      transform: translateX(-50%) rotateX(66deg) rotateZ(-2deg);
      transform-origin: 50% 50%;
      mix-blend-mode: screen;
      opacity: var(--halo-opacity, 0.9);
      transition: opacity 420ms ease-out;
      animation: accretionPulse 7.2s ease-in-out infinite;
    }

    .warp-tunnel {
      z-index: -2;
      opacity: 0;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 14%, rgba(190, 225, 255, 0.12) 19%, transparent 27%),
        conic-gradient(from 90deg at 50% 50%, transparent, rgba(122, 187, 255, 0.17), transparent, rgba(255, 193, 107, 0.19), transparent);
      filter: blur(0.5px);
      mix-blend-mode: screen;
      transform: scale(0.78) rotate(calc(var(--scroll) * 70deg));
      transition: opacity 420ms ease-out, transform 260ms ease-out;
      animation: warpSpin 9s linear infinite;
    }

    .orbital-veil {
      z-index: -2;
      opacity: 0;
      background:
        radial-gradient(ellipse at 50% 82%, rgba(144, 213, 255, 0.2), transparent 31%),
        linear-gradient(115deg, transparent 0 62%, rgba(255, 213, 147, 0.18) 68%, transparent 76%);
      mix-blend-mode: screen;
      transform: translate3d(calc(var(--scroll) * -18px), calc(var(--scroll) * 18px), 0);
      transition: opacity 420ms ease-out;
    }

    :root[data-scene="0"] .accretion-halo {
      --halo-opacity: 0.9;
    }

    :root[data-scene="1"] .accretion-halo {
      --halo-opacity: 0;
    }

    :root[data-scene="1"] .warp-tunnel {
      opacity: 0.88;
      transform: scale(1.08) rotate(calc(var(--scroll) * 70deg));
    }

    :root[data-scene="2"] .accretion-halo,
    :root[data-scene="2"] .warp-tunnel {
      --halo-opacity: 0;
      opacity: 0;
    }

    :root[data-scene="2"] .orbital-veil {
      opacity: 0.78;
    }

    .lens-sweep {
      z-index: -1;
      background:
        linear-gradient(105deg, transparent 0 38%, rgba(255, 255, 255, 0.12) 47%, transparent 58%),
        radial-gradient(ellipse at 50% 66%, rgba(255, 205, 135, 0.24), transparent 28%);
      opacity: 0;
      transform: translateX(-38%);
      mix-blend-mode: screen;
      animation: lensSweep 11s ease-in-out infinite;
    }

    .ship-glint {
      z-index: -1;
      top: 26%;
      left: 82%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      box-shadow:
        0 0 10px rgba(255, 255, 255, 0.9),
        -70px 0 58px rgba(152, 199, 255, 0.26);
      animation: signalBlink 4.8s ease-in-out infinite;
    }

    .film-grain {
      z-index: 1;
      opacity: 0.22;
      background-image:
        repeating-radial-gradient(circle at 17% 23%, rgba(255, 255, 255, 0.34) 0 1px, transparent 1px 3px),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 4px);
      background-size: 120px 120px, 6px 6px;
      mix-blend-mode: overlay;
      animation: grainShift 0.9s steps(2, end) infinite;
    }

    .letterbox {
      z-index: 2;
    }

    .letterbox::before,
    .letterbox::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      height: 7.5svh;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.96), rgba(0, 0, 0, 0.72));
    }

    .letterbox::before {
      top: 0;
    }

    .letterbox::after {
      bottom: 0;
      transform: rotate(180deg);
    }

    @keyframes orbitalFrame {
      0% {
        transform: scale(1.03) translate3d(-0.5%, -0.3%, 0);
        filter: contrast(1.04) saturate(0.92) brightness(0.98);
      }

      100% {
        transform: scale(1.075) translate3d(0.6%, 0.5%, 0);
        filter: contrast(1.08) saturate(1.02) brightness(1.03);
      }
    }

    @keyframes starField {
      0% {
        background-position: 0 0, 0 0, 0 0, 0 0;
      }

      100% {
        background-position: 120px -180px, -160px 120px, 90px 210px, -210px -120px;
      }
    }

    @keyframes accretionPulse {
      0%,
      100% {
        transform: translateX(-50%) rotateX(66deg) rotateZ(-2deg) scale(1);
      }

      50% {
        transform: translateX(-50%) rotateX(66deg) rotateZ(1deg) scale(1.045);
      }
    }

    @keyframes lensSweep {
      0%,
      72%,
      100% {
        opacity: 0;
        transform: translateX(-42%);
      }

      82% {
        opacity: 0.85;
      }

      94% {
        opacity: 0;
        transform: translateX(42%);
      }
    }

    @keyframes signalBlink {
      0%,
      76%,
      100% {
        opacity: 0.25;
        transform: scale(0.76);
      }

      82% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes warpSpin {
      0% {
        background-position: 50% 50%;
        filter: blur(0.5px) brightness(1);
      }

      50% {
        background-position: 48% 52%;
        filter: blur(0.5px) brightness(1.28);
      }

      100% {
        background-position: 50% 50%;
        filter: blur(0.5px) brightness(1);
      }
    }

    @keyframes grainShift {
      0% {
        transform: translate3d(0, 0, 0);
      }

      100% {
        transform: translate3d(-2%, 1.5%, 0);
      }
    }

    .scene-scroll {
      position: relative;
      z-index: 3;
    }

    .scene-panel {
      min-height: 100vh;
      min-height: 100svh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
    }

    .scene-dots {
      position: fixed;
      right: 28px;
      top: 50%;
      z-index: 10;
      display: grid;
      gap: 12px;
      transform: translateY(-50%);
    }

    .scene-dot {
      width: 8px;
      height: 8px;
      border: 1px solid rgba(255, 255, 255, 0.66);
      border-radius: 50%;
      padding: 0;
      background: rgba(255, 255, 255, 0.14);
      box-shadow: 0 0 18px rgba(167, 211, 255, 0.18);
      cursor: pointer;
      transition: transform 220ms ease, background 220ms ease, box-shadow 220ms ease;
    }

    .scene-dot.is-active {
      background: rgba(255, 255, 255, 0.92);
      box-shadow:
        0 0 14px rgba(255, 255, 255, 0.8),
        0 0 30px rgba(134, 189, 255, 0.36);
      transform: scale(1.45);
    }

    .music-toggle {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 10;
      width: 52px;
      height: 52px;
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: rgba(9, 18, 37, 0.52);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(14px);
      cursor: pointer;
    }

    .music-toggle:hover {
      background: rgba(18, 33, 63, 0.7);
    }

    .music-toggle:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .music-toggle__play {
      width: 0;
      height: 0;
      margin-left: 4px;
      border-top: 9px solid transparent;
      border-bottom: 9px solid transparent;
      border-left: 15px solid currentColor;
    }

    .music-toggle__pause {
      display: none;
      width: 15px;
      height: 18px;
      border-left: 5px solid currentColor;
      border-right: 5px solid currentColor;
    }

    .music-toggle.is-playing .music-toggle__play {
      display: none;
    }

    .music-toggle.is-playing .music-toggle__pause {
      display: block;
    }

    @media (max-width: 640px) {
      body {
        min-height: 300vh;
        min-height: 300svh;
      }

      .scene-frame {
        background-position: center;
      }

      .accretion-halo {
        bottom: 24svh;
        width: 104vw;
        height: 24vw;
      }

      .letterbox::before,
      .letterbox::after {
        height: 5.5svh;
      }

      .music-toggle {
        right: 18px;
        bottom: 18px;
        width: 48px;
        height: 48px;
      }

      .scene-dots {
        right: 18px;
        gap: 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
        scroll-snap-type: none;
      }

      .stars-drift,
      .accretion-halo,
      .lens-sweep,
      .ship-glint,
      .film-grain,
      .warp-tunnel {
        animation: none;
      }

      .scene-frame,
      .warp-tunnel,
      .orbital-veil,
      .scene-dot {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="cinema-stage" aria-hidden="true">
    <div class="scene-backdrops">
      <div class="scene-frame" data-scene-frame="0"></div>
      <div class="scene-frame" data-scene-frame="1"></div>
      <div class="scene-frame" data-scene-frame="2"></div>
    </div>
    <div class="stars-drift"></div>
    <div class="accretion-halo"></div>
    <div class="warp-tunnel"></div>
    <div class="orbital-veil"></div>
    <div class="lens-sweep"></div>
    <div class="ship-glint"></div>
    <div class="film-grain"></div>
    <div class="letterbox"></div>
  </div>
  <main class="scene-scroll" aria-label="电影感深空滚动场景">
    <section class="scene-panel" aria-label="黑洞深空"></section>
    <section class="scene-panel" aria-label="虫洞星轨"></section>
    <section class="scene-panel" aria-label="远方星球"></section>
  </main>
  <nav class="scene-dots" aria-label="切换场景">
    <button class="scene-dot is-active" type="button" aria-label="黑洞深空"></button>
    <button class="scene-dot" type="button" aria-label="虫洞星轨"></button>
    <button class="scene-dot" type="button" aria-label="远方星球"></button>
  </nav>
  <audio id="backgroundMusic" src="assets/flower-sea.mp3" preload="metadata" loop></audio>
  <button class="music-toggle" id="musicToggle" type="button" aria-label="播放背景音乐" aria-pressed="false" disabled>
    <span class="music-toggle__play" aria-hidden="true"></span>
    <span class="music-toggle__pause" aria-hidden="true"></span>
  </button>
  <script>
    const music = document.getElementById("backgroundMusic");
    const musicToggle = document.getElementById("musicToggle");
    const sceneFrames = Array.from(document.querySelectorAll(".scene-frame"));
    const scenePanels = Array.from(document.querySelectorAll(".scene-panel"));
    const sceneDots = Array.from(document.querySelectorAll(".scene-dot"));
    const root = document.documentElement;

    const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

    const updateScene = () => {
      const maxScroll = Math.max(1, root.scrollHeight - window.innerHeight);
      const progress = clamp(window.scrollY / maxScroll, 0, 1);
      const frameProgress = progress * (sceneFrames.length - 1);
      const activeScene = clamp(Math.round(frameProgress), 0, sceneFrames.length - 1);

      root.dataset.scene = String(activeScene);
      document.body.style.setProperty("--scroll", progress.toFixed(4));

      sceneFrames.forEach((frame, index) => {
        const distance = Math.abs(frameProgress - index);
        const opacity = clamp(1 - distance * 1.15, 0, 1);
        const drift = (index - frameProgress) * 22;
        const scale = 1.045 + progress * 0.04 + opacity * 0.035;

        frame.style.opacity = opacity.toFixed(3);
        frame.style.transform = `scale(${scale.toFixed(3)}) translate3d(${drift.toFixed(2)}px, ${(progress * -18).toFixed(2)}px, 0)`;
        frame.style.filter = `contrast(${(1.04 + opacity * 0.08).toFixed(3)}) brightness(${(0.86 + opacity * 0.18).toFixed(3)})`;
      });

      sceneDots.forEach((dot, index) => {
        dot.classList.toggle("is-active", index === activeScene);
        dot.setAttribute("aria-current", index === activeScene ? "true" : "false");
      });
    };

    sceneDots.forEach((dot, index) => {
      dot.addEventListener("click", () => {
        scenePanels[index].scrollIntoView({ behavior: "smooth", block: "start" });
      });
    });

    updateScene();
    window.addEventListener("scroll", updateScene, { passive: true });
    window.addEventListener("resize", updateScene);

    music.addEventListener("loadedmetadata", () => {
      musicToggle.disabled = false;
    });

    music.addEventListener("error", () => {
      musicToggle.disabled = true;
      musicToggle.classList.remove("is-playing");
      musicToggle.setAttribute("aria-label", "背景音乐文件未就绪");
      musicToggle.setAttribute("aria-pressed", "false");
    });

    musicToggle.addEventListener("click", async () => {
      if (music.paused) {
        try {
          await music.play();
          musicToggle.classList.add("is-playing");
          musicToggle.setAttribute("aria-label", "暂停背景音乐");
          musicToggle.setAttribute("aria-pressed", "true");
        } catch {
          musicToggle.classList.remove("is-playing");
          musicToggle.setAttribute("aria-label", "播放背景音乐");
          musicToggle.setAttribute("aria-pressed", "false");
        }

        return;
      }

      music.pause();
      musicToggle.classList.remove("is-playing");
      musicToggle.setAttribute("aria-label", "播放背景音乐");
      musicToggle.setAttribute("aria-pressed", "false");
    });
  </script>
</body>
</html>
